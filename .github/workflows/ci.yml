# CI workflow for building, scanning, and pushing backend/frontend Docker images.
# Runs on pushes to main. Uses a matrix to build both backend and frontend images.
# Includes secret scanning, container vulnerability scanning, and ECR deployment.

name: CI - Build, Scan & Push

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1

jobs:

  build-scan-push:

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    strategy:
      matrix:
        include:

          - name: backend
            repository: maromstream-backend
            dockerfile: Server/MagicStreamServer/Dockerfile
            context: Server/MagicStreamServer
            image_tag: backend

          - name: frontend
            repository: maromstream-frontend
            dockerfile: Client/magic-stream-client/Dockerfile
            context: Client/magic-stream-client
            image_tag: frontend

    steps:

    # -------------------------
    # Checkout Code
    # -------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # -------------------------
    # Secret Scanning
    # -------------------------
    - name: Gitleaks scan
      uses: gitleaks/gitleaks-action@v2
      # Scan the repository for leaked secrets before building any images.

    # -------------------------
    # IaC Security Scan
    # -------------------------
    - name: Trivy IaC scan
      uses: aquasecurity/trivy-action@master
      # Scan Terraform configuration files for IaC security and misconfiguration issues.
      with:
        scan-type: iac
        scan-ref: ./terraform
        format: table
        severity: HIGH,CRITICAL
        exit-code: 1

    # -------------------------
    # Docker Build
    # -------------------------
    - name: Build Docker image
      run: |
        docker build \
          -t ${{ matrix.repository }}:${{ github.sha }} \
          -f ${{ matrix.dockerfile }} \
          ${{ matrix.context }}
      # Build the Docker image for the current matrix entry.

    # -------------------------
    # Container Security Scan
    # -------------------------
    - name: Trivy image scan
      uses: aquasecurity/trivy-action@v0.9.0
      # Pin to a stable Trivy release instead of tracking master.
      with:
        image-ref: '${{ matrix.repository }}:${{ github.sha }}'
        format: table
        severity: HIGH,CRITICAL
        exit-code: 1

    # -------------------------
    # AWS Authentication
    # -------------------------
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: ${{ env.AWS_REGION }}
      # Authenticate to AWS using OIDC, avoiding long-lived credentials.

    # -------------------------
    # ECR Login
    # -------------------------
    - name: Login to Amazon ECR
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity \
          --query Account \
          --output text)

        aws ecr get-login-password \
          --region $AWS_REGION | \
          docker login \
          --username AWS \
          --password-stdin \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      # Login to ECR so we can push the built image.

    # -------------------------
    # Tag & Push
    # -------------------------
    - name: Push image to ECR
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity \
          --query Account \
          --output text)

        REGISTRY="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
        IMAGE="$REGISTRY/${{ matrix.repository }}"

        docker tag \
          ${{ matrix.repository }}:${{ github.sha }} \
          $IMAGE:${{ github.sha }}

        docker tag \
          ${{ matrix.repository }}:${{ github.sha }} \
          $IMAGE:${{ matrix.image_tag }}

        docker push \
          $IMAGE:${{ github.sha }}

        docker push \
          $IMAGE:${{ matrix.image_tag }}
      # Tag and push both the SHA-based image and the stable image tag.
