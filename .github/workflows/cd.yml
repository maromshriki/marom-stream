name: CD - Deploy

on:
  workflow_run:
    workflows: ["CI - Build & Push"]
    types:
      - completed
    branches: ["main"]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME || 'arn:aws:iam::ACCOUNT_ID:role/github-actions-role' }}
          aws-region: us-east-1

      - name: Trigger backend instance refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name backend-asg \
            --preferences MinHealthyPercentage=90

      - name: Trigger frontend instance refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name frontend-asg \
            --preferences MinHealthyPercentage=90
            