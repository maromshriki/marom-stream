version: "3.9"

services:
  mongo:
    image: mongo:latest
    container_name: mongo
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./Server/MagicStreamServer
    container_name: magicstream-backend
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - DATABASE_NAME=magicstream
      - ALLOWED_ORIGINS=http://localhost:5173
    depends_on:
      - mongo
  frontend:
    build: ./Client/magic-stream-client
    container_name: magicstream-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0  
volumes:
  mongo_data: